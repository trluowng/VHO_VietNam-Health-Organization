services:
  # Backend — FastAPI: /triage, /auth/*, /profile, /calendar, /cycle
  - type: web
    name: vho-yen-backend
    runtime: python
    rootDir: Yen/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRIAGE_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: TRIAGE_MODEL
        value: gemini-2.5-flash
      - key: JWT_SECRET
        sync: false
    autoDeploy: true

  # Frontend — React + Vite static site
  - type: web
    name: vho-yen-frontend
    runtime: static
    rootDir: Yen/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Sau khi vho-yen-backend deploy xong, đổi thành
      # https://<vho-yen-backend-url>.onrender.com rồi redeploy
      # (Vite bake env var vào lúc build — KHÔNG có /triage ở cuối).
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
